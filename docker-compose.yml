services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - backend_target:/app/target
      - cargo_registry:/usr/local/cargo/registry
    ports:
      - "3000:3000"

  seed:
    build:
      context: ./backend
      target: dev
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_target:/app/target
      - cargo_registry:/usr/local/cargo/registry
    restart: "no"
    command: ["sh", "-c", "sqlx migrate run && cargo run --bin seed"]

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  pgdata:
  backend_target:
  cargo_registry:
